name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild build \
            -scheme EbbShout \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Test
        run: |
          xcodebuild test \
            -scheme EbbShout \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
